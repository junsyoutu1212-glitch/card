<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Holographic Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      background-image: radial-gradient(circle at center, #0af 1px, transparent 1px);
      background-size: 40px 40px;
      font-family: sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-around;
      min-height: 100vh;
      padding: 20px;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .card-container {
      position: relative;
      perspective: 1000px;
    }

    .card-frame {
      position: relative;
      width: 280px;
      height: 380px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.1s ease;
    }

    .card-frame:hover {
      transform: scale(1.02);
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-shine {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(255, 255, 255, 0.6) 0%,
        rgba(255, 255, 255, 0.3) 20%,
        transparent 50%
      );
      pointer-events: none;
      border-radius: 20px;
    }

    .controls-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 320px;
    }

    .controls label {
      font-size: 14px;
      font-weight: 500;
    }

    .controls input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      background-color: #0e0e0e;
      color: #fff;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .controls input[type="text"]:focus {
      border-color: #0af;
    }

    .controls button {
      padding: 10px 16px;
      background-color: #0af;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .controls button:hover {
      background-color: #08c;
    }

    .error-msg {
      font-size: 12px;
      color: #f00;
      min-height: 1em;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }

    .modal-card-frame {
      position: relative;
      width: 280px;
      height: 380px;
      border-radius: 20px;
      cursor: grab;
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    .modal-card-frame:active {
      cursor: grabbing;
    }

    .modal-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.1s ease;
      box-shadow: 0 10px 40px rgba(10, 175, 255, 0.5);
    }

    .modal-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-shine {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at var(--modal-mouse-x, 50%) var(--modal-mouse-y, 50%),
        rgba(255, 255, 255, 0.8) 0%,
        rgba(255, 255, 255, 0.4) 20%,
        transparent 50%
      );
      pointer-events: none;
      border-radius: 20px;
    }

    .modal-close {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      background: rgba(10, 175, 255, 0.2);
      border: 3px solid #0af;
      border-radius: 50%;
      color: #0af;
      font-size: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      animation: closeAppear 0.4s ease 0.3s both;
    }

    @keyframes closeAppear {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .modal-close:hover {
      background: #0af;
      color: #000;
      box-shadow: 0 0 20px rgba(10, 175, 255, 0.5);
    }

    .modal-info {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="card-wrapper">
  <div class="card-container" id="cardContainer">
    <div class="card-frame" id="cardFrame">
      <img
        src="https://mblogthumb-phinf.pstatic.net/MjAyNDExMDVfMzMg/MDAxNzMwNzMzMzAzNTQ1.R4V3sdUyeI9HzBdNKNhqZQWx9nKB_t_0M2XHoeULaeEg.iq04XG2qlSvGpiJb_3LKOsW0oN9Oymqpbrtvl-KOtb8g.JPEG/2024-10-30-0aa6dbf6097f4145acd2875916a53782.jpg?type=w800"
        class="card-image"
        id="cardImage"
      />
      <div class="card-shine" id="cardShine"></div>
    </div>
  </div>

  <div class="controls-wrap">
    <div class="controls">
      <label for="imageUrl">카드 이미지 URL:</label>
      <input type="text" id="imageUrl" placeholder="https://.../image.jpg" />
      <button onclick="applyImage()">이미지 적용</button>
      <div id="errorMsg" class="error-msg"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-card-frame" id="modalCardFrame">
      <div class="modal-card-inner" id="modalCardInner">
        <img class="modal-image" id="modalImage" />
        <div class="modal-shine" id="modalShine"></div>
      </div>
      <div class="modal-close" id="modalClose" onclick="closeModal()">×</div>
    </div>
    <div class="modal-info">끌어서 회전 | Esc로 닫기</div>
  </div>
</div>

<script>
  const API_BASE = '';

  const cardContainer = document.getElementById('cardContainer');
  const cardFrame = document.getElementById('cardFrame');
  const cardImage = document.getElementById('cardImage');
  const cardShine = document.getElementById('cardShine');
  const errorMsg = document.getElementById('errorMsg');
  const modal = document.getElementById('modal');
  const modalImage = document.getElementById('modalImage');
  const modalCardFrame = document.getElementById('modalCardFrame');
  const modalCardInner = document.getElementById('modalCardInner');
  const modalShine = document.getElementById('modalShine');

  // 카드 마우스 이동 - 빛 + 3D 회전
  cardContainer.addEventListener('mousemove', (e) => {
    const rect = cardContainer.getBoundingClientRect();
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // 빛 효과
    const lightX = (x / rect.width) * 100;
    const lightY = (y / rect.height) * 100;
    cardShine.style.setProperty('--mouse-x', `${lightX}%`);
    cardShine.style.setProperty('--mouse-y', `${lightY}%`);

    // 3D 회전
    const rotateY = ((x - centerX) / centerX) * 25;
    const rotateX = ((centerY - y) / centerY) * 25;
    cardFrame.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
  });

  cardContainer.addEventListener('mouseleave', () => {
    cardShine.style.setProperty('--mouse-x', '50%');
    cardShine.style.setProperty('--mouse-y', '50%');
    cardFrame.style.transition = 'transform 0.3s ease';
    cardFrame.style.transform = 'rotateY(0deg) rotateX(0deg)';
  });

  // 카드 클릭 - 2바퀴 회전 후 모달 표시
  cardFrame.addEventListener('click', () => {
    cardFrame.style.transition = 'transform 0.8s ease-out';
    cardFrame.style.transform = 'rotateY(720deg)';

    setTimeout(() => {
      modalImage.src = cardImage.src;
      modal.classList.add('active');
      modalCardInner.style.transform = 'rotateY(0deg) rotateX(0deg)';
      cardFrame.style.transition = 'transform 0.1s ease';
    }, 800);
  });

  // 모달 카드 - 마우스 움직임 + 빛
  modalCardFrame.addEventListener('mousemove', (e) => {
    if (modal.classList.contains('active')) {
      const rect = modalCardFrame.getBoundingClientRect();
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // 빛 효과
      const lightX = (x / rect.width) * 100;
      const lightY = (y / rect.height) * 100;
      modalShine.style.setProperty('--modal-mouse-x', `${lightX}%`);
      modalShine.style.setProperty('--modal-mouse-y', `${lightY}%`);

      // 3D 회전 (드래그 중이 아닐 때만)
      if (!isDragging) {
        const rotateY = ((x - centerX) / centerX) * 25;
        const rotateX = ((centerY - y) / centerY) * -25;
        modalCardInner.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
      }
    }
  });

  // 모달 카드 드래그 - 2바퀴 회전 + 중앙으로 끌려오기
  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let currentRotationY = 0;

  modalCardFrame.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging || !modal.classList.contains('active')) return;

    const rect = modalCardFrame.getBoundingClientRect();
    
    // 빛 움직임
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    modalShine.style.setProperty('--modal-mouse-x', `${x}%`);
    modalShine.style.setProperty('--modal-mouse-y', `${y}%`);

    // 드래그 거리
    const deltaX = e.clientX - startX;
    const deltaY = e.clientY - startY;
    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

    // 2바퀴 회전 (720도)
    const rotationY = (deltaX / window.innerWidth) * 720;
    currentRotationY = rotationY;

    // 3D 회전
    const rotationX = (deltaY / window.innerHeight) * 30;

    // 중앙으로 끌려오는 효과 (scale 줄어들기)
    const scale = Math.max(0.7, 1 - distance / 800);

    modalCardInner.style.transform = `rotateY(${rotationY}deg) rotateX(${rotationX}deg) scale(${scale})`;
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;

      // 원위치로 부드럽게 돌아오기
      modalCardInner.style.transition = 'transform 0.6s ease-out';
      modalCardInner.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';

      setTimeout(() => {
        modalCardInner.style.transition = 'transform 0.1s ease';
      }, 600);
    }
  });

  // 모달 닫기
  function closeModal() {
    modal.classList.remove('active');
  }

  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      closeModal();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
    }
  });

  // 이미지 변경
  function applyImage() {
    const url = document.getElementById('imageUrl').value.trim();
    errorMsg.textContent = '';
    if (!url) return;

    const img = new Image();
    img.onload = () => {
      cardImage.src = url;
    };
    img.onerror = () => {
      errorMsg.textContent = '올바른 이미지 URL이 아닙니다.';
      setTimeout(() => {
        errorMsg.textContent = '';
      }, 3000);
    };
    img.src = url;
  }

  // 방문자 추적
  (function recordVisitToServer() {
    fetch(API_BASE + '/api/myip')
      .then(r => r.json())
      .then(data => {
        fetch(API_BASE + '/api/visit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ip: data.ip })
        });
      })
      .catch(() => {});
  })();

  // 콘솔 명령
  window.getVisitUser = async function () {
    try {
      const res = await fetch(API_BASE + '/api/getvisituser');
      const data = await res.json();
      console.log('총 방문 수:', data.count);
      console.table(data.visits);
      return data;
    } catch (e) {
      console.error('getVisitUser 에러', e);
    }
  };
</script>

</body>
</html>
