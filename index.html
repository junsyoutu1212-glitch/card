<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>3D 카드 + 글리터 + 스포트라이트</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      background-image: radial-gradient(circle at center, #0af 1px, transparent 1px);
      background-size: 40px 40px;
      font-family: sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 100vh;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
      position: relative;
      perspective: 500px;
    }

    .card-frame {
      position: relative;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      width: 210px;
      height: 290px;
    }

    .card-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: contrast(1.15) saturate(1.2) brightness(1.05);
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255, 219, 112, 0.9) 45%,
        rgba(132, 50, 255, 0.8) 50%,
        transparent 54%
      );
      background-size: 160% 160%;
      background-position: 50% 50%;
      filter: brightness(1.2) opacity(0.9);
      mix-blend-mode: color-dodge;
      transition: background-position 0.12s ease;
    }

    .spotlight {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle,
        rgba(255, 255, 255, 0.9) 0%,
        rgba(255, 255, 255, 0.4) 25%,
        rgba(255, 230, 150, 0.0) 70%
      );
      mix-blend-mode: screen;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.15s ease;
    }

    .controls-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateY(20px);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 320px;
    }

    .controls label {
      font-size: 14px;
      font-weight: 500;
    }

    .controls input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      background-color: #0e0e0e;
      color: #fff;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .controls input[type="text"]:focus {
      border-color: #0af;
    }

    .controls button {
      padding: 10px 16px;
      background-color: #0af;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .controls button:hover {
      background-color: #08c;
    }

    .error-msg {
      font-size: 12px;
      color: #f00;
      min-height: 1em;
    }
  </style>
</head>
<body>

<div class="container" id="container">
  <div class="card-frame" id="cardFrame">
    <img
      src="https://mblogthumb-phinf.pstatic.net/MjAyNDExMDVfMzMg/MDAxNzMwNzMzMzAzNTQ1.R4V3sdUyeI9HzBdNKNhqZQWx9nKB_t_0M2XHoeULaeEg.iq04XG2qlSvGpiJb_3LKOsW0oN9Oymqpbrtvl-KOtb8g.JPEG/2024-10-30-0aa6dbf6097f4145acd2875916a53782.jpg?type=w800"
      class="card-image"
      id="cardImage"
    />
    <div class="overlay" id="overlay"></div>
    <div class="spotlight" id="spotlight"></div>
  </div>
</div>

<div class="controls-wrap">
  <div class="controls">
    abel for="imageUrl">카드 이미지 URL:</label>
    <input type="text" id="imageUrl" placeholder="https://.../image.jpg" />
    <button onclick="applyImage()">이미지 적용</button>
    <div id="errorMsg" class="error-msg"></div>
  </div>
</div>

<script>
  // API_BASE 설정 (같은 도메인 사용)
  const API_BASE = '';

  const container = document.getElementById('container');
  const cardFrame = document.getElementById('cardFrame');
  const cardImg   = document.getElementById('cardImage');
  const overlay   = document.getElementById('overlay');
  const spotlight = document.getElementById('spotlight');
  const errorMsg  = document.getElementById('errorMsg');

  cardFrame.addEventListener('mousemove', function (e) {
    const rect   = cardFrame.getBoundingClientRect();
    const x      = e.clientX - rect.left;
    const y      = e.clientY - rect.top;
    const width  = rect.width;
    const height = rect.height;

    const gx = (x / width)  * 100;
    const gy = (y / height) * 100;
    overlay.style.backgroundPosition = `${gx}% ${gy}%`;

    const rotateY = ((x / width) - 0.5) * 20;
    const rotateX = ((0.5 - y / height)) * 20;
    container.style.transform =
      `perspective(500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

    spotlight.style.left = x + 'px';
    spotlight.style.top  = y + 'px';
    spotlight.style.opacity = 1;
  });

  cardFrame.addEventListener('mouseleave', function () {
    container.style.transform =
      'perspective(500px) rotateX(0deg) rotateY(0deg)';
    spotlight.style.opacity = 0;
  });

  function applyImage() {
    const url = document.getElementById('imageUrl').value.trim();
    errorMsg.textContent = '';
    if (!url) return;

    const img = new Image();
    img.onload = () => {
      cardImg.src = url;

      const maxWidth  = 210;
      const maxHeight = 290;
      const ratio     = img.width / img.height;

      let w = maxWidth;
      let h = w / ratio;
      if (h > maxHeight) {
        h = maxHeight;
        w = h * ratio;
      }

      cardFrame.style.width  = w + 'px';
      cardFrame.style.height = h + 'px';
    };
    img.onerror = () => {
      errorMsg.textContent = '올바른 이미지 URL이 아닙니다.';
      setTimeout(() => {
        errorMsg.textContent = '';
      }, 3000);
    };
    img.src = url;
  }

  // ---- 페이지 로드 시 방문 기록 서버에 전송 ----
  (function recordVisitToServer() {
    fetch(API_BASE + '/api/visit', {
      method: 'POST'
    }).catch(() => {});
  })();

  // ---- 콘솔에서 getVisitUser() 호출 시 방문 정보(IP 포함) 조회 ----
  window.getVisitUser = async function () {
    try {
      const res = await fetch(API_BASE + '/api/getvisituser');
      const data = await res.json();
      console.log('총 방문 수:', data.count);
      console.table(data.visits);
      return data;
    } catch (e) {
      console.error('getVisitUser 에러', e);
    }
  };
</script>

</body>
</html>
