<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            background-image: radial-gradient(circle at center, #0af 1px, transparent 1px);
            background-size: 40px 40px;
            /* 정사각형 점 간격 조금 키움 (30 → 40) */
            font-family: sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
            perspective: 500px;
        }

        .card-frame {
            position: relative;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 210px;
            /* 카드 조금 키움 (180 → 210) */
            height: 290px;
            /* 250 → 290 */
        }

        .card-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(105deg,
                    transparent 40%,
                    rgba(255, 219, 112, 0.8) 45%,
                    rgba(132, 50, 255, 0.6) 50%,
                    transparent 54%);
            background-size: 150% 150%;
            background-position: 50% 50%;
            filter: brightness(1.2) opacity(0.8);
            mix-blend-mode: color-dodge;
            transition: background-position 0.15s ease;
        }

        .controls-wrap {
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: translateY(20px);
            /* 카드랑 살짝 띄우기 */
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 320px;
        }

        .controls label {
            font-size: 14px;
            font-weight: 500;
        }

        .controls input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #333;
            background-color: #0e0e0e;
            color: #fff;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .controls input[type="text"]:focus {
            border-color: #0af;
        }

        .controls button {
            padding: 10px 16px;
            background-color: #0af;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .controls button:hover {
            background-color: #08c;
        }

        .error-msg {
            font-size: 12px;
            color: #f00;
            min-height: 1em;
        }
    </style>
</head>

<body>

    <div class="container" id="container">
        <div class="card-frame" id="cardFrame">
            <img src="https://mblogthumb-phinf.pstatic.net/MjAyNDExMDVfMzMg/MDAxNzMwNzMzMzAzNTQ1.R4V3sdUyeI9HzBdNKNhqZQWx9nKB_t_0M2XHoeULaeEg.iq04XG2qlSvGpiJb_3LKOsW0oN9Oymqpbrtvl-KOtb8g.JPEG/2024-10-30-0aa6dbf6097f4145acd2875916a53782.jpg?type=w800"
                class="card-image" id="cardImage" />
            <div class="overlay" id="overlay"></div>
        </div>
    </div>

    <div class="controls-wrap">
        <div class="controls">
            <label for="imageUrl">카드 이미지 URL:</label>
            <input type="text" id="imageUrl" placeholder="https://.../image.jpg" />
            <button onclick="applyImage()">이미지 적용</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const cardFrame = document.getElementById('cardFrame');
        const cardImg = document.getElementById('cardImage');
        const overlay = document.getElementById('overlay');
        const errorMsg = document.getElementById('errorMsg');

        cardFrame.addEventListener('mousemove', function (e) {
            const rect = cardFrame.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const width = rect.width;
            const height = rect.height;

            const gx = (x / width) * 100;
            const gy = (y / height) * 100;
            overlay.style.backgroundPosition = `${gx}% ${gy}%`;

            const rotateY = ((x / width) - 0.5) * 20;
            const rotateX = ((0.5 - y / height)) * 20;

            container.style.transform =
                `perspective(500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        cardFrame.addEventListener('mouseleave', function () {
            container.style.transform =
                'perspective(500px) rotateX(0deg) rotateY(0deg)';
        });

        function applyImage() {
            const url = document.getElementById('imageUrl').value.trim();
            errorMsg.textContent = '';
            if (!url) return;

            const img = new Image();
            img.onload = () => {
                cardImg.src = url;

                const maxWidth = 210;  // 변경된 카드 최대값에 맞춤
                const maxHeight = 290;
                const ratio = img.width / img.height;

                let w = maxWidth;
                let h = w / ratio;
                if (h > maxHeight) {
                    h = maxHeight;
                    w = h * ratio;
                }

                cardFrame.style.width = w + 'px';
                cardFrame.style.height = h + 'px';
            };
            img.onerror = () => {
                errorMsg.textContent = '올바른 이미지 URL이 아닙니다.';
                setTimeout(() => {
                    errorMsg.textContent = '';
                }, 3000);
            };
            img.src = url;
        }
    </script>

</body>

</html>
