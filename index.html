<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Holographic Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      background-image: radial-gradient(circle at center, #0af 1px, transparent 1px);
      background-size: 40px 40px;
      font-family: sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-around;
      min-height: 100vh;
      padding: 20px;
    }

    .card-container {
      position: relative;
      perspective: 1000px;
    }

    .card-frame {
      position: relative;
      width: 280px;
      height: 380px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transition: transform 0.3s ease;
      transform-style: preserve-3d;
    }

    .card-frame:hover {
      transform: scale(1.02);
    }

    .card-frame.flip {
      animation: flipCard 0.6s ease-in-out;
    }

    @keyframes flipCard {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(90deg); }
      100% { transform: rotateY(0deg); }
    }

    .card-frame.drag {
      animation: dragRotate 0.3s ease;
    }

    @keyframes dragRotate {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(-5deg); }
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-shine {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(255, 255, 255, 0.6) 0%,
        rgba(255, 255, 255, 0.3) 20%,
        transparent 50%
      );
      pointer-events: none;
      border-radius: 20px;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .controls-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 320px;
    }

    .controls label {
      font-size: 14px;
      font-weight: 500;
    }

    .controls input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      background-color: #0e0e0e;
      color: #fff;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .controls input[type="text"]:focus {
      border-color: #0af;
    }

    .controls button {
      padding: 10px 16px;
      background-color: #0af;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .controls button:hover {
      background-color: #08c;
    }

    .error-msg {
      font-size: 12px;
      color: #f00;
      min-height: 1em;
    }

    /* 모달 스타일 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-card-frame {
      position: relative;
      width: 280px;
      height: 380px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(10, 175, 255, 0.5);
      cursor: grab;
      perspective: 1000px;
      transform-style: preserve-3d;
      transition: transform 0.2s ease;
    }

    .modal-card-frame:active {
      cursor: grabbing;
    }

    .modal-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-shine {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at var(--modal-mouse-x, 50%) var(--modal-mouse-y, 50%),
        rgba(255, 255, 255, 0.8) 0%,
        rgba(255, 255, 255, 0.4) 20%,
        transparent 50%
      );
      pointer-events: none;
      border-radius: 20px;
    }

    .modal-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .modal-close {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #0af;
      border-radius: 12px;
      color: #0af;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: #0af;
      color: #000;
    }

    .modal-info {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="card-wrapper">
  <div class="card-container" id="cardContainer">
    <div class="card-frame" id="cardFrame">
      <img
        src="https://mblogthumb-phinf.pstatic.net/MjAyNDExMDVfMzMg/MDAxNzMwNzMzMzAzNTQ1.R4V3sdUyeI9HzBdNKNhqZQWx9nKB_t_0M2XHoeULaeEg.iq04XG2qlSvGpiJb_3LKOsW0oN9Oymqpbrtvl-KOtb8g.JPEG/2024-10-30-0aa6dbf6097f4145acd2875916a53782.jpg?type=w800"
        class="card-image"
        id="cardImage"
      />
      <div class="card-shine" id="cardShine"></div>
    </div>
  </div>

  <div class="controls-wrap">
    <div class="controls">
      <label for="imageUrl">카드 이미지 URL:</label>
      <input type="text" id="imageUrl" placeholder="https://.../image.jpg" />
      <button onclick="applyImage()">이미지 적용</button>
      <div id="errorMsg" class="error-msg"></div>
    </div>
  </div>
</div>

<!-- 모달 -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-card-frame" id="modalCardFrame">
      <img class="modal-image" id="modalImage" />
      <div class="modal-shine" id="modalShine"></div>
    </div>
    <div class="modal-controls">
      <div class="modal-info">끌어서 회전 | Esc로 닫기</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
  </div>
</div>

<script>
  const API_BASE = '';

  const cardContainer = document.getElementById('cardContainer');
  const cardFrame = document.getElementById('cardFrame');
  const cardImage = document.getElementById('cardImage');
  const cardShine = document.getElementById('cardShine');
  const errorMsg = document.getElementById('errorMsg');
  const modal = document.getElementById('modal');
  const modalImage = document.getElementById('modalImage');
  const modalCardFrame = document.getElementById('modalCardFrame');
  const modalShine = document.getElementById('modalShine');

  // 카드 마우스 이동 - 빛 효과
  cardContainer.addEventListener('mousemove', (e) => {
    const rect = cardContainer.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    
    cardShine.style.setProperty('--mouse-x', `${x}%`);
    cardShine.style.setProperty('--mouse-y', `${y}%`);
  });

  cardContainer.addEventListener('mouseleave', () => {
    cardShine.style.setProperty('--mouse-x', '50%');
    cardShine.style.setProperty('--mouse-y', '50%');
  });

  // 카드 클릭 시 모달 열기 + 수직 회전 애니메이션
  cardFrame.addEventListener('click', () => {
    cardFrame.classList.add('flip');
    setTimeout(() => {
      cardFrame.classList.remove('flip');
      modalImage.src = cardImage.src;
      modal.classList.add('active');
    }, 300);
  });

  // 모달 내부 카드 끌기 - 수직 회전 + 빛 이동
  let isDragging = false;
  let startX = 0;

  modalCardFrame.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    modalCardFrame.classList.add('drag');
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging || !modal.classList.contains('active')) return;

    const rect = modalCardFrame.getBoundingClientRect();
    
    // 빛 움직임
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    
    modalShine.style.setProperty('--modal-mouse-x', `${x}%`);
    modalShine.style.setProperty('--modal-mouse-y', `${y}%`);

    // 끌 때 수직 회전
    const deltaX = e.clientX - startX;
    const rotation = (deltaX / window.innerWidth) * 30; // 최대 30도 회전
    modalCardFrame.style.transform = `rotateY(${rotation}deg)`;
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      modalCardFrame.classList.remove('drag');
      modalCardFrame.style.transform = 'rotateY(0deg)';
    }
  });

  // 모달 닫기
  function closeModal() {
    modal.classList.remove('active');
  }

  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      closeModal();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
    }
  });

  function applyImage() {
    const url = document.getElementById('imageUrl').value.trim();
    errorMsg.textContent = '';
    if (!url) return;

    const img = new Image();
    img.onload = () => {
      cardImage.src = url;
    };
    img.onerror = () => {
      errorMsg.textContent = '올바른 이미지 URL이 아닙니다.';
      setTimeout(() => {
        errorMsg.textContent = '';
      }, 3000);
    };
    img.src = url;
  }

  (function recordVisitToServer() {
    fetch(API_BASE + '/api/myip')
      .then(r => r.json())
      .then(data => {
        fetch(API_BASE + '/api/visit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ip: data.ip })
        });
      })
      .catch(() => {});
  })();

  window.getVisitUser = async function () {
    try {
      const res = await fetch(API_BASE + '/api/getvisituser');
      const data = await res.json();
      console.log('총 방문 수:', data.count);
      console.table(data.visits);
      return data;
    } catch (e) {
      console.error('getVisitUser 에러', e);
    }
  };
</script>

</body>
</html>
